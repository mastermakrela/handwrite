<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>handwrite · capture</title>
<style>
  :root { --ink:#1d2347; --accent:#3b3f9e; --line:#e6e9f2; --muted:#7a8499; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; overscroll-behavior-y: contain;
    touch-action: pan-y;            /* allow scroll, block pinch / double-tap zoom */
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: #f6f7fb;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; /* pencil must not select */
  }
  header {
    position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 14px calc(10px + env(safe-area-inset-top)); background: rgba(246,247,251,.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
  }
  .logo { font-family: "Snell Roundhand","Segoe Script",cursive; font-size: 1.5rem; color: var(--accent); }
  #count { color: var(--muted); font-size: .85rem; }
  .spacer { flex: 1; }
  button, label.btn {
    font: inherit; font-weight: 600; font-size: .9rem; border: 1px solid var(--line); background: #fff; color: var(--ink);
    padding: 9px 13px; border-radius: 10px; cursor: pointer;
  }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button:active, label.btn:active { filter: brightness(.95); }
  label.btn input { display: none; }
  .hint { color: var(--muted); font-size: .78rem; padding: 8px 16px 2px; }
  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 12px; padding: 12px 14px 40px; align-items: start;
  }
  .group { grid-column: 1 / -1; color: var(--muted); font-size: .78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; margin-top: 8px; }
  .group:first-child { margin-top: 0; }
  .cell { position: relative; aspect-ratio: 1/1; background: #fff; border: 1px solid var(--line);
    border-radius: 12px; box-shadow: 0 1px 2px rgba(24,32,58,.04); overflow: hidden;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .cell.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .cell .pad { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .cell .clabel { position: absolute; top: 4px; left: 7px; font-size: .8rem; font-weight: 700; color: #aeb6c9; pointer-events: none; }
  .cell .clr { position: absolute; top: 2px; right: 2px; padding: 2px 6px; font-size: .72rem; line-height: 1;
    border: none; background: transparent; color: #c3c9d6; }
  .cell .clr:active { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <span class="logo">handwrite</span>
    <span id="count">0 captured</span>
    <span class="spacer"></span>
    <button id="build" class="primary">⬇︎ .otf</button>
    <button id="json">⬇︎ strokes</button>
    <label class="btn">Import<input id="import" type="file" accept="application/json" /></label>
  </header>
  <p class="hint">Write each character once, sitting on the solid baseline · multiple strokes OK · tap ✕ to redo a cell · everything stays on your device.</p>
  <main id="grid"></main>
  <script type="module" src="./capture-app.ts"></script>
</body>
</html>
